<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Daily Dashboard</title>
</head>
<body>
    <!-- Overlying Container (dashboard) -->
    <div class="dashboard">
        <h1>Daily Dashboard</h1>
        <!-- Widget Container -->
        <div class="widgets">

            <!-- Weather Widget -->
            <div class="widget" id="weather-widget">
                <h2>Weather</h2>
                <p id="weather-info">Loading...</p>
                <p id="weather-recommend">Loading...</p>
            </div>

            <!-- Daily Goals Widget -->
            <div class="widget" id="goals-widget">
                <h2>Daily Goals</h2>
                <ul id="goals-list">
                    <li>Loading...</li>
                </ul>
            </div>

            <!-- Routine Widget -->
            <div class="widget" id="routine-widget">
                <h2>Today's Routine</h2>
                <ul id="routine-list">
                    <li>Loading...</li>
                </ul>
            </div>

            <!-- News Widget -->
            <div class="widget" id="news-widget">
                <h2>News</h2>
                <ul id="news-list">
                    <li>Loading...</li>
                </ul>
            </div>

            <!-- Devotional Widget -->
            <div class="widget" id="devotional-widget">
                <h2>Devotional</h2>
                <p id="verse-text">Loading...</p>
            
                <!-- Devotional Input -->
                <div class="widget" id="devotional-input-widget">
                    <h2>Share your Thoughts</h2>
                    <textarea id="devotional-input" placeholder="Write your thoughts here..."></textarea>
                    <button id="save-devotional">Save Devotional</button>
                </div>
            </div>

            <!-- Note Widget -->
            <div class="widget" id="note-widget">
                <h2>Notes</h2>
                <textarea id="note-input" placeholder="Write your notes here..."></textarea>
                <button id="save-note">Save Note</button>
            </div>

            <!-- View Items Widget -->
            <div class="widget" id="view-items-widget">
                <h2>View Items</h2>
                <button id="view-notes">View Notes</button>
                <button id="view-devotionals">View Devotionals</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
