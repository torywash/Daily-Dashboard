<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Daily Dashboard</title>
</head>
<body>
    <!-- Overlying Container (dashboard) -->
    <div class="dashboard">
        <h1>Daily Dashboard</h1>
        <!-- Widget Container -->
        <div class="widgets">

            <!-- Weather Widget -->
            <div class="widget" id="weather-widget">
                <h2>Weather</h2>
                <p id="weather-info">Loading...</p>
            </div>

            <!-- News Widget -->
            <div class="widget" id="news-widget">
                <h2>News</h2>
                <ul id="news-list">
                    <li>Loading...</li>
                </ul>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
